name: clix_app
description: "CLIX — Таксі в один клік. Unified App for Passengers, Drivers & Dispatchers."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Навігація
  go_router: ^14.0.0
  # Стейт-менеджмент
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  # HTTP-запити
  dio: ^5.7.0
  # JWT & Secure Storage
  flutter_secure_storage: ^9.2.0
  # Карта (OpenStreetMap)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Геолокація
  geolocator: ^13.0.0
  # Шрифти
  google_fonts: ^6.2.0
  # Утиліти
  intl: ^0.19.0
  json_annotation: ^4.9.0
  provider: ^6.1.5+1
  flutter_dotenv: ^5.2.1
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
