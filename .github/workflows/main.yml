  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # cache: pip прискорює повторні runs ~1 хвилина
          # не завантажує пакети якщо requirements.txt не змінився
          cache: 'pip'

      - name: Install quality tools
        run: pip install flake8 black isort bandit

        #non-blocking: якщо якийсь інструмент не встановився, не зупиняємо весь workflow
        
      - name: Flake8 — PEP8 стиль і синтаксис
        continue-on-error: true
        run: cd volunteer && flake8 .

      - name: Black — перевірка форматування
        # --check: тільки перевіряє, не змінює файли
        run: cd volunteer && black --check .
      - name: isort — порядок імпортів
        run: cd volunteer && isort --check-only .

      - name: Bandit — security scan
        # -ll: тільки HIGH і MEDIUM severity (не LOW)
        # Знаходить: hardcoded passwords, SQL injection, shell injection
        run: cd volunteer && bandit -r . -x .venv,migrations -ll